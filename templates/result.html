<!DOCTYPE html>
<html>

<head>

<title>Results</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<link rel="stylesheet"
href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

<h2>Candidate Ranking</h2>

<table class="table table-bordered">

<tr>
<th>Rank</th>
<th>Resume</th>
<th>Score</th>
<th>Skills</th>
</tr>

{% for r in results %}

<tr>

<td>{{ loop.index }}</td>

<td>{{ r.name }}</td>

<td>{{ r.score }}%</td>

<td>{{ r.skills }}</td>

</tr>

{% endfor %}

</table>

<h3 class="mt-5">Resume Score Chart</h3>

<canvas id="resumeChart"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

var labels = {{ labels | tojson }};
var scores = {{ scores | tojson }};

var ctx = document.getElementById("resumeChart").getContext("2d");

new Chart(ctx, {

type: "bar",

data: {

labels: labels,

datasets: [{

label: "Resume Score (%)",

data: scores,

backgroundColor: "#007bff"

}]

},

options: {

scales: {

y: {

beginAtZero: true,
max: 100

}

}

}

});

</script>

</body>

</html>
